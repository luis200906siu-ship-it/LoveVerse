<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Respuestas ❤️</title>

<style>

body{

margin:0;
height:100vh;

background:linear-gradient(#18000b,#550025);

font-family:Georgia,serif;

display:flex;

justify-content:center;

align-items:center;

}


.contenedor{

background:white;

color:#333;

width:500px;

max-width:90%;

padding:30px;

border-radius:25px;

box-shadow:0 0 40px rgba(255,255,255,.3);

text-align:center;

}


h1{

color:#b3003b;

}


input{

padding:12px;

border-radius:15px;

border:1px solid #ccc;

font-size:16px;

}


button{

margin-top:15px;

padding:12px 30px;

border:none;

border-radius:25px;

background:#b3003b;

color:white;

font-size:18px;

cursor:pointer;

}


.respuesta{

background:#ffe6ee;

padding:15px;

margin-top:20px;

border-radius:15px;

}


#error{

color:red;

}


</style>

</head>


<body>


<div class="contenedor">


<div id="login">


<h1>
🔐 Área privada
</h1>


<p>
Escribe la contraseña:
</p>


<input id="clave" type="password" placeholder="Escribe la contraseña">


<br>


<button onclick="entrar()">
Entrar ❤️
</button>


<p id="error"></p>


</div>



<div id="panel" style="display:none;">


<h1>
💌 Respuestas recibidas
</h1>


<div id="lista">

</div>


</div>


</div>



<script>

async function entrar(){

let clave = document.getElementById("clave").value;


let respuesta = await fetch("/login", {

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

clave:clave

})

});


let datos = await respuesta.json();


console.log(datos);


if(datos.acceso){


document.getElementById("login").style.display="none";


document.getElementById("panel").style.display="block";


cargarRespuestas();


}else{


document.getElementById("error").innerHTML =
"Contraseña incorrecta ❌";


}


}


</script>


</body>

</html>
